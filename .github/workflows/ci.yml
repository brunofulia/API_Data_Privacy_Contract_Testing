name: API Data Privacy Contract CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Network Drivers
      run: npx playwright install --with-deps

    - name: Run Contract & Security Suite
      run: npx playwright test

    - name: Archive Failure-Safe Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-api-contract-report
        path: |
          playwright-report/
          test-results/
        retention-days: 30
