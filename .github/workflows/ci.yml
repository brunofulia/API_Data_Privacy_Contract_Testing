name: API Data Privacy Contract CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BOOKER_API_URL: https://restful-booker.herokuapp.com
      MOCK_API_URL: https://6a3a783f917c7b14c74d8f21.mockapi.io/api/v1
      API_USERNAME: admin
      API_PASSWORD: password123
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Contract & Security Suite
      run: npx playwright test

    - name: Archive Failure-Safe Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-api-contract-report
        path: |
          playwright-report/
          test-results/
        retention-days: 30
